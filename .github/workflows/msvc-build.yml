name: MSVC Windows Build

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  build-windows-client:
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Configure CMake (Windows x86, MSVC)
        run: cmake -B out/build/windows-x86 -G "Visual Studio 17 2022" -A Win32 -DENABLE_EDITOR=OFF

      - name: Build Release
        run: cmake --build out/build/windows-x86 --config Release

      - name: Upload client artifact
        uses: actions/upload-artifact@v4
        with:
          name: MuMainClient-win32
          path: out/build/windows-x86/src/Release/
          if-no-files-found: error